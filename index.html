<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>单词听写表</title>
    <meta
      name="description"
      content="单词听写表：支持自定义词库、朗读听写、两种模式（显示翻译/显示单词）、回车判定与错误标红、上下键切换自动朗读。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="main" class="page">
      <header class="page-head">
        <div class="container">
          <h1 class="page-title">单词听写表</h1>
          <p class="page-subtitle">
            方式一：隐藏翻译，自动朗读，回车后显示翻译并标红错误；方式二：隐藏翻译，显示单词，回车后显示单词。支持自定义词库。
          </p>
        </div>
      </header>

      <section class="section" id="vocab">
        <div class="container">
          <div class="vocab-panel" aria-label="单词表控制面板">
            <div class="vocab-controls">
              <div class="field">
                <label for="modeSelect">使用方式</label>
                <select id="modeSelect">
                  <option value="A" selected>方式一：隐藏翻译，自动朗读，回车后显示翻译并标红错误</option>
                  <option value="B">方式二：隐藏翻译，显示单词，回车后显示单词</option>
                </select>
              </div>

              <div class="field">
                <label for="voiceSelect">朗读声音（可选）</label>
                <select id="voiceSelect">
                  <option value="">自动</option>
                </select>
              </div>

              <div class="field">
                <label for="rate">语速</label>
                <input id="rate" type="range" min="0.6" max="1.3" step="0.05" value="1" />
              </div>

              <div class="row vocab-buttons">
                <button class="button primary" id="startVocabBtn" type="button">开始</button>
                <button class="button" id="stopVocabBtn" type="button">停止朗读</button>
                <button class="button subtle" id="clearProgressBtn" type="button">清空进度</button>
              </div>
            </div>

            <details class="vocab-import" open>
              <summary>导入/编辑词库（支持 TSV / CSV / JSON）</summary>
              <p class="hint">
                推荐格式：每行 <code>word[TAB]translation</code>。例如：<code>apple\t苹果</code>。也支持逗号分隔或 JSON 数组。
              </p>
              <textarea id="vocabSource" rows="8" spellcheck="false"></textarea>
              <div class="row">
                <button class="button primary" id="applyVocabBtn" type="button">应用词库</button>
                <button class="button subtle" id="loadSampleBtn" type="button">载入示例</button>
              </div>
              <p class="hint" id="vocabStatus" role="status" aria-live="polite"></p>
            </details>
          </div>

          <div class="vocab-table-wrap" aria-label="单词表">
            <table class="vocab-table">
              <thead>
                <tr>
                  <th class="col-no">#</th>
                  <th class="col-word">单词</th>
                  <th class="col-meaning">翻译</th>
                  <th class="col-input">输入</th>
                </tr>
              </thead>
              <tbody id="vocabBody"></tbody>
            </table>
          </div>

          <p class="hint" style="margin-top: 10px">
            操作：在输入框里打字后按 <strong>Enter</strong> 判定；按 <strong>↑/↓</strong> 切换单词；切换会自动朗读当前单词。
          </p>
        </div>
      </section>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
